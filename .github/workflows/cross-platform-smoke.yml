name: Cross-Platform Smoke

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Compile on macOS
        if: runner.os != 'Windows'
        run: ./gradlew --no-daemon classes

      - name: Compile on Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat --no-daemon classes

      - name: Run smoke test on macOS
        if: runner.os != 'Windows'
        run: ./gradlew --no-daemon -DhideSurface=true -DmaxFrames=1 -Dfullscreen=false runSmiley

      - name: Run smoke test on Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat --no-daemon -DhideSurface=true -DmaxFrames=1 -Dfullscreen=false runSmiley
